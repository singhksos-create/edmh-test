</div>

function showMenu() {
    user.name = document.getElementById("userName").value.trim();
    user.phone = document.getElementById("userPhone").value.trim();
    if (!user.name || !user.phone) { alert("⚠️ 請先輸入姓名與電話！"); return; }
    document.getElementById("display-name").innerText = user.name;
    document.getElementById("login-section").style.display = "none";
    document.getElementById("menu-section").style.display = "block";
}

function startQuiz(key) {
    const topicMap = {
        part1: "Part 1: Inbound & Concession",
        part2: "Part 2: 半導體營運守則",
        part3: "Part 3: IC 重新包裝操作",
        extra1: "專題 1: 異常與收貨規範",
        extra2: "專題 2: 卡板堆放與防護",
        extra3: "專題 3: 包裝物料管理",
        extra4: "專題 4: 過期產品處理",
        extra5: "專題 5: 特採品(Concession)規範"
    };
    user.topic = topicMap[key];
    currentQuestions = allQuizData[key];
    score = 0; wrongList = [];
    document.getElementById("current-topic-name").innerText = "考核主題：" + user.topic;
    document.getElementById("menu-section").style.display = "none";
    document.getElementById("quiz-section").style.display = "block";
    renderQuiz();
}

function renderQuiz() {
    const container = document.getElementById("questions-container");
    container.innerHTML = "";
    currentQuestions.forEach((item, idx) => {
        let div = document.createElement("div");
        div.className = "question-block";
        div.innerHTML = `<p><b>Q${idx+1}. ${item.q}</b></p>`;
        item.options.forEach((opt, optIdx) => {
            let btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = opt;
            btn.onclick = (e) => check(e.target, idx, optIdx);
            div.appendChild(btn);
        });
        let fb = document.createElement("div");
        fb.id = "fb-" + idx;
        fb.className = "feedback";
        div.appendChild(fb);
        container.appendChild(div);
    });
}

function check(btn, qIdx, optIdx) {
    const item = currentQuestions[qIdx];
    const fb = document.getElementById("fb-" + qIdx);
    const btns = btn.parentElement.querySelectorAll(".option-btn");
    btns.forEach(b => b.disabled = true);
    fb.style.display = "block";
    if (optIdx === item.ans) {
        score++;
        btn.style.background = "#d4edda"; btn.style.borderColor = "#28a745";
        fb.innerText = "✅ 回答正確"; fb.style.color = "#155724"; fb.style.background = "#d4edda";
    } else {
        wrongList.push(`Q${qIdx+1}(${item.q.substring(0,10)}...)`);
        btn.style.background = "#f8d7da"; btn.style.borderColor = "#dc3545";
        fb.innerHTML = `❌ 錯誤。正確答案：<br><b>${item.options[item.ans]}</b>`;
        fb.style.color = "#721c24"; fb.style.background = "#f8d7da";
    }
}

function finishQuiz() {
    if (!confirm("確定要提交測驗結果嗎？")) return;
    const btn = document.getElementById("submit-btn");
    btn.disabled = true; btn.innerText = "數據傳送中...";
    
    // 請確認此處 URL 與您的 Google Script 部署網址一致
    const gasUrl = "https://script.google.com/macros/s/AKfycby7JdhztIjttmfSKkOBQcJq6hnw2Y5XpSowxw6NPI6A30FxPG0rSfKj2cSz10In_Gg_2w/exec";

    fetch(gasUrl, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify({
            name: user.name,
            phone: user.phone,
            topic: user.topic,
            score: score,
            total: currentQuestions.length,
            wrongAnswers: wrongList.join(" | ") || "全對"
        })
    }).then(() => {
        alert(`測驗結束！\n主題：${user.topic}\n得分：${score}/${currentQuestions.length}\n錯題：${wrongList.join(", ") || "無"}`);
        location.reload();
    }).catch(err => {
        alert("網路錯誤，提交失敗！");
        btn.disabled = false;
    });
}
