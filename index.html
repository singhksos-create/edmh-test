<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDMH 綜合測驗平台</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f4f7f9; color: #333; padding: 20px; line-height: 1.6; }
        .container { max-width: 650px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #1a73e8; text-align: center; border-bottom: 2px solid #e8f0fe; padding-bottom: 10px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: bold; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 6px; font-size: 18px; cursor: pointer; transition: 0.3s; font-weight: bold; margin-bottom: 15px; }
        .btn-primary { background-color: #1a73e8; color: white; }
        .btn-primary:hover { background-color: #155cb0; }
        .btn-outline { background-color: #fff; color: #1a73e8; border: 2px solid #1a73e8; text-align: left; padding-left: 20px; }
        .btn-outline:hover { background-color: #e8f0fe; }
        .btn-submit { background-color: #34a853; color: white; margin-top: 30px; }
        .btn-submit:disabled { background-color: #ccc; }
        
        .question-block { margin-top: 25px; padding: 20px; border: 1px solid #eee; border-radius: 8px; background: #fafafa; }
        .q-text { font-size: 17px; font-weight: bold; margin-bottom: 15px; color: #202124; }
        .option-btn { display: block; width: 100%; text-align: left; padding: 12px; margin-bottom: 10px; background-color: #fff; border: 1px solid #dadce0; border-radius: 6px; cursor: pointer; font-size: 15px; }
        .option-btn:hover:not(:disabled) { background-color: #f8f9fa; border-color: #1a73e8; }
        .feedback { margin-top: 10px; font-weight: bold; padding: 12px; border-radius: 6px; display: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="container" id="login-section">
    <h2>EDMH 測驗系統</h2>
    <div class="input-group">
        <label>您的姓名</label>
        <input type="text" id="userName" placeholder="請輸入姓名">
    </div>
    <div class="input-group">
        <label>您的電話號碼</label>
        <input type="text" id="userPhone" placeholder="請輸入電話">
    </div>
    <button class="btn btn-primary" onclick="goToMenu()">登入系統</button>
    <p id="error-msg" style="color: red; text-align: center; display: none;">⚠️ 請完整填寫姓名與電話！</p>
</div>

<div class="container" id="menu-section" style="display: none;">
    <h2>請選擇測驗主題</h2>
    <p style="text-align: center; color: #666;">你好 <span id="display-name" style="font-weight: bold; color: #1a73e8;"></span>，請選擇主題：</p>
    <button class="btn btn-outline" onclick="startQuiz('part1')">📘 第一部分：Inbound & Concession 流程</button>
    <button class="btn btn-outline" onclick="startQuiz('part2')">📗 第二部分：半導體營運守則與儲存指南</button>
</div>

<div class="container" id="quiz-section" style="display: none;">
    <h2 id="quiz-title" style="font-size: 20px;"></h2>
    <div id="questions-container"></div>
    <button id="final-submit" class="btn btn-submit" onclick="finishQuiz()">提交測驗結果</button>
</div>

<script>
let user = { name: "", phone: "", topic: "" };
let score = 0;
let currentQuestions = [];

const allQuizData = {
    part1: [
        { q: "在 Inbound 流程中，SAP 會自動執行哪兩個動作到 in-transit plant？", options: ["GR 和 IR", "TO 和 SO", "PO 和 PR", "AWB 和 CO"], ans: 0 },
        { q: "誰負責根據 DVAI 報告將 GR 記錄過帳 (post) 到倉庫系統？", options: ["EDMH BU", "Warehouse", "LSMHK Office", "SAP 系統"], ans: 2 },
        { q: "收貨時如果標籤上有『TAIWAN』，它會標示在哪兩個字眼下方？", options: ["EXPORT 或 IMPORT", "DIFFUSED 或 ASSEMBLED", "INBOUND 或 OUTBOUND", "PASSED 或 FAILED"], ans: 1 },
        { q: "收到哪一種產品時，必須額外發送 Email 給 LSMHK office？", options: ["E13 產品", "TAIWAN 庫存", "Automotive (汽車) 產品", "Expiry 庫存"], ans: 2 },
        { q: "哪兩種產品需要掃描序號和數量到 Excel 檔案中？", options: ["E13 和 Automotive", "TAIWAN 和 E13", "Expiry 和 Concession", "Diffused 和 Assembled"], ans: 0 },
        { q: "對於『E13』紙箱，為何倉庫需要保留每箱數量的記錄？", options: ["為了計算運費", "為了訂單分配用途 (Allocation)", "為了報廢申請", "為了更新 SAP 價格"], ans: 1 },
        { q: "Automotive 產品掃描序號的主要目的是？", options: ["用於每月按序號層級進行的庫存盤點", "用於申請出口許可", "用於標註有效期限", "用於更換包裝"], ans: 0 },
        { q: "當系統自動建立 TO 時，通常會建議放置在哪個區域？", options: ["檢驗區", "申請區", "空儲位 (empty bin) 或 塊區 (block area)", "出口區"], ans: 2 },
        { q: "流程中的 TO 縮寫代表什麼？", options: ["Transfer Order", "Total Output", "Transport Office", "Task Option"], ans: 0 },
        { q: "Reference # 欄位的正確格式是什麼？", options: ["日期 + 序號", "Material code + 數量", "AWB # + 國家代碼 (如 TW)", "Batch # + 廠商代碼"], ans: 2 },
        { q: "處理過期庫存 (Expiry) 申請時，需要拍哪些照片？", options: ["僅外箱", "外箱 (Outer box) 與 鋁箔袋 (AL bag) 上的工廠標籤", "貨車司機照片", "倉庫全景圖"], ans: 1 },
        { q: "準備 Concession Bincard 時，必須附上什麼文件？", options: ["核准的 Concession Form", "原始發票", "司機簽單", "空箱照片"], ans: 0 },
        { q: "在 SAP 中執行『Release Block stock』是誰的職責？", options: ["Warehouse", "LSMHK Office", "Forwarder", "EDMH BU"], ans: 1 },
        { q: "申請 Concession 期間，實體貨物應存放在哪個區域？", options: ["Expiry stock 區", "Appling Concession 區", "Approved Concession 區", "Scrap 區"], ans: 1 },
        { q: "當 Concession 正式核准後，實體貨物應移往何處？", options: ["Approved Concession 區", "In-transit 區", "裝卸碼頭", "On-hand plant"], ans: 0 },
        { q: "Concession number 應該貼在貨物的哪裡？", options: ["棧板底部", "紙箱上 (Carton box)", "辦公室門口", "SAP 螢幕旁"], ans: 1 },
        { q: "在 SAP 解除凍結 (Release) 庫存是為了讓系統建立什麼？", options: ["SO (Sales Order)", "PO (Purchase Order)", "GR (Goods Receipt)", "PR (Purchase Requisition)"], ans: 0 },
        { q: "若收貨發現損壞 (Cargo damage)，倉庫的首要動作是？", options: ["直接拒收", "自行修復", "提供資訊並拍照回報", "更換新紙箱"], ans: 2 },
        { q: "Outbound 流程核對訂單資訊時，應參照哪份文件？", options: ["核准的 Concession Form", "DVAI 報告", "進口許可證", "員工手冊"], ans: 0 },
        { q: "列印出來的 Concession Label 最後應如何處理？", options: ["存檔備查", "貼在實體庫存上 (Attach to stock)", "交給快遞公司", "貼在電腦主機上"], ans: 1 }
    ],
    part2: [
        { q: "根據 LSMHK-SOP-01，下列哪一項不是該指引針對的半導體產品？", options: ["影像傳感器 (ISs)", "汽車相機模塊", "耳機天線", "大規模集成電路"], ans: 2 },
        { q: "關於 SOP 的修訂，若倉庫營運商在未經 LSMHK 認同下自行更改內容，責任由誰承擔？", options: ["LSMHK", "SSS QED", "倉庫營運商", "EDMH"], ans: 2 },
        { q: "在收貨檢查外箱時，若發現破損或污染，應遵循哪份文件處理？", options: ["LSMHK-SOP-01", "LSMHK-SOP-03", "LSMHK-SOP-08", "QRC-B07-02"], ans: 1 },
        { q: "對於半導體產品 (Semiconductor)，入倉日期應如何記錄在外箱上？", options: ["用手寫方式記錄", "使用「Sony Corp. of HK Ltd.」入倉日期印章", "黏貼標籤即可", "無須在箱外記錄"], ans: 1 },
        { q: "對於器件產品 (Component)，入倉日期的記錄方式為何？", options: ["在每一卡板外先寫上入倉日期", "在每個小包裝蓋印", "僅記錄在 SAP 系統", "隨意擺放"], ans: 0 },
        { q: "在貨架儲存半導體產品時，遵循的基本原則是什麼？", options: ["先進後出 (LIFO)", "隨機存放", "先進先出 (FIFO)", "按產品價值高低存放"], ans: 2 },
        { q: "在貨架上存放貨物時，應遵循怎樣的方向順序？", options: ["由內至外，由下至上", "由外至內，由上至下", "由左至右，不論上下", "由右至左，由下至上"], ans: 1 },
        { q: "根據指引，下列哪種半導體產品「不一定」按來貨日期順序排放儲存？", options: ["鏡頭模塊", "影像傳感器 (Imaging Sensor)", "激光二極管", "顯示裝置"], ans: 1 },
        { q: "在 SAP batch no. 記錄中，若為「Sales Return」(銷售退回) 貨物，代碼前綴為何？", options: ["R", "T", "D", "S"], ans: 3 },
        { q: "半導體產品儲存環境的溫度建議範圍是多少？", options: ["0℃ - 30℃", "10℃ - 40℃", "5℃ - 35℃", "15℃ - 25℃"], ans: 2 },
        { q: "半導體產品儲存環境的濕度建議範圍是多少？", options: ["20% - 60%", "30% - 75%", "40% - 80%", "50% - 90%"], ans: 1 },
        { q: "關於貨物堆放，下列哪項敘述正確？", options: ["為了節省空間，貨物應直接放在地上", "貨物可以單獨放在膠袋內儲存", "上重下輕堆放以保持穩定", "上輕下重堆放以避免外箱擠壓"], ans: 3 },
        { q: "出貨時，若提取貨物的日期與 SAP 指示不同，日期差別上限為多少日？", options: ["7 日", "14 日", "30 日", "60 日"], ans: 2 },
        { q: "重新包裝貨品 (Repack) 應如何製作標籤？", options: ["手寫標籤", "避免使用箱頭筆，利用電腦打印 C-3 標貼", "影印原裝標籤", "不必貼標籤"], ans: 1 },
        { q: "對於剩餘貨品 (Balance Lot)，原裝的 EIA 或 C-3 標貼應如何處理？", options: ["直接撕掉", "保留標貼，刪去原數量並手寫上餘數", "用白色膠帶完全覆蓋", "無須處理"], ans: 1 },
        { q: "根據 EDMH Operation Overview，產品代碼 (Product Code) 在標籤上通常是幾位數字？", options: ["7 位", "8 位", "9 位", "10 位"], ans: 2 },
        { q: "承上題，在 SAP 系統中，該產品代碼會顯示為幾位數字？", options: ["8 位", "9 位", "10 位", "12 位"], ans: 0 },
        { q: "在配送過程中，若需保護僅裝在內箱中的產品，應採取什麼措施？", options: ["直接運送", "放入出口包裝紙箱或中轉箱", "用報紙包裹", "只需黏貼警告標籤"], ans: 1 },
        { q: "下列哪一項不是儲存區內禁止的事項？", options: ["使用化學品", "飲食或吸煙", "使用 SAP 系統", "產生機械壓力或震動"], ans: 2 },
        { q: "哪份 SOP 指引專門處理卡板堆放貨物及綁帶/包膜的使用？", options: ["LSMHK-SOP-01", "LSMHK-SOP-05", "LSMHK-SOP-08", "LSMHK-SOP-09"], ans: 2 }
    ]
};

function goToMenu() {
    const name = document.getElementById("userName").value.trim();
    const phone = document.getElementById("userPhone").value.trim();
    if (!name || !phone) { document.getElementById("error-msg").style.display = "block"; return; }
    user.name = name; user.phone = phone;
    document.getElementById("display-name").innerText = name;
    document.getElementById("login-section").style.display = "none";
    document.getElementById("menu-section").style.display = "block";
}

function startQuiz(part) {
    user.topic = (part === 'part1' ? "Inbound&Concession" : "半導體守則與儲存");
    currentQuestions = allQuizData[part];
    score = 0;
    document.getElementById("quiz-title").innerText = "📌 主題：" + user.topic;
    document.getElementById("menu-section").style.display = "none";
    document.getElementById("quiz-section").style.display = "block";
    renderQuiz();
}

function renderQuiz() {
    const container = document.getElementById("questions-container");
    container.innerHTML = "";
    currentQuestions.forEach((item, idx) => {
        let qDiv = document.createElement("div");
        qDiv.className = "question-block";
        qDiv.innerHTML = `<p class="q-text">${idx+1}. ${item.q}</p>`;
        item.options.forEach((opt, optIdx) => {
            let btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = opt;
            btn.onclick = () => check(btn, idx, optIdx);
            qDiv.appendChild(btn);
        });
        let fb = document.createElement("div");
        fb.id = "fb-" + idx;
        fb.className = "feedback";
        qDiv.appendChild(fb);
        container.appendChild(qDiv);
    });
}

function check(btn, qIdx, optIdx) {
    const correctIdx = currentQuestions[qIdx].ans;
    const fb = document.getElementById("fb-" + qIdx);
    const btns = btn.parentElement.querySelectorAll(".option-btn");
    btns.forEach(b => b.disabled = true);
    fb.style.display = "block";
    if (optIdx === correctIdx) {
        score++;
        btn.style.backgroundColor = "#d4edda";
        fb.innerText = "✅ 正確！";
        fb.style.color = "#155724";
        fb.style.backgroundColor = "#d4edda";
    } else {
        btn.style.backgroundColor = "#f8d7da";
        fb.innerHTML = `❌ 錯誤。正確答案是：<br><b>${currentQuestions[qIdx].options[correctIdx]}</b>`;
        fb.style.color = "#721c24";
        fb.style.backgroundColor = "#f8d7da";
    }
}

function finishQuiz() {
    const submitBtn = document.getElementById("final-submit");
    submitBtn.disabled = true;
    submitBtn.innerText = "正在傳送結果...";
    const gasUrl = "https://script.google.com/macros/s/AKfycby7JdhztIjttmfSKkOBQcJq6hnw2Y5XpSowxw6NPI6A30FxPG0rSfKj2cSz10In_Gg_2w/exec"; 

    const payload = {
        name: user.name,
        phone: user.phone,
        topic: user.topic,
        score: score,
        total: currentQuestions.length
    };

    fetch(gasUrl, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify(payload)
    })
    .then(() => {
        alert(`測驗完成！\n主題：${user.topic}\n得分：${score} / ${currentQuestions.length}\n結果已上傳。`);
        location.reload();
    })
    .catch(err => {
        alert("提交失敗，請檢查網路。");
        submitBtn.disabled = false;
    });
}
</script>
</body>
</html>
