function showMenu() {
    user.name = document.getElementById("userName").value.trim();
    user.phone = document.getElementById("userPhone").value.trim();
    if (!user.name || !user.phone) { alert("⚠️ 請先輸入姓名與電話！"); return; }
    document.getElementById("display-name").innerText = user.name;
    document.getElementById("login-section").style.display = "none";
    document.getElementById("menu-section").style.display = "block";
}

function startQuiz(key) {
    const topicMap = {
        p1: "Part 1: Inbound & Concession",
        p2: "Part 2: 營運守則",
        p3: "Part 3: IC 重新包裝",
        p4: "Part 4: 異常收貨",
        p5: "Part 5: 卡板防護",
        p6: "Part 6: 物料與過期處理",
        p7: "Part 7: 特採規範"
    };
    user.topic = topicMap[key];
    currentQuestions = allQuizData[key];
    score = 0; wrongList = [];
    document.getElementById("current-topic-name").innerText = "考核主題：" + user.topic;
    document.getElementById("menu-section").style.display = "none";
    document.getElementById("quiz-section").style.display = "block";
    renderQuiz();
}

function renderQuiz() {
    const container = document.getElementById("questions-container");
    container.innerHTML = "";
    currentQuestions.forEach((item, idx) => {
        let div = document.createElement("div");
        div.className = "question-block";
        div.innerHTML = `<p><b>Q${idx+1}. ${item.q}</b></p>`;
        item.options.forEach((opt, optIdx) => {
            let btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = opt;
            btn.onclick = (e) => check(e.target, idx, optIdx);
            div.appendChild(btn);
        });
        let fb = document.createElement("div");
        fb.id = "fb-" + idx;
        fb.className = "feedback";
        div.appendChild(fb);
        container.appendChild(div);
    });
}

function check(btn, qIdx, optIdx) {
    const item = currentQuestions[qIdx];
    const fb = document.getElementById("fb-" + qIdx);
    const btns = btn.parentElement.querySelectorAll(".option-btn");
    btns.forEach(b => b.disabled = true);
    fb.style.display = "block";
    if (optIdx === item.ans) {
        score++;
        btn.style.background = "#d4edda"; btn.style.borderColor = "#28a745";
        fb.innerText = "✅ 回答正確"; fb.style.color = "#155724"; fb.style.background = "#d4edda";
    } else {
        wrongList.push(`Q${qIdx+1}`);
        btn.style.background = "#f8d7da"; btn.style.borderColor = "#dc3545";
        fb.innerHTML = `❌ 錯誤。正確答案：<b>${item.options[item.ans]}</b>`;
        fb.style.color = "#721c24"; fb.style.background = "#f8d7da";
    }
}

function finishQuiz() {
    if (!confirm("確定要提交結果嗎？")) return;
    const btn = document.getElementById("submit-btn");
    btn.disabled = true; btn.innerText = "提交中...";
    
    // 使用您最新的 GAS URL
    const gasUrl = "https://script.google.com/macros/s/AKfycbwibUbNH_RAsu5heX1fhgg--b3eZTVxjSor-46hxbo2CWKiPWcjL5a8Upff0alzh_xyAw/exec";

    fetch(gasUrl, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify({
            name: user.name,
            phone: user.phone,
            topic: user.topic,
            score: score,
            total: currentQuestions.length,
            wrongAnswers: wrongList.join(", ") || "無"
        })
    }).then(() => {
        alert(`完成！\n得分：${score}/${currentQuestions.length}\n錯題：${wrongList.join(", ") || "無"}`);
        location.reload();
    });
}
